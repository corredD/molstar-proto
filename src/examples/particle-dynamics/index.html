<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <title>Mol* Particle Dynamics Demo</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            #app { position: absolute; width: 100%; height: 100%; }
            #controls { position: absolute; width: 160px; top: 20px; right: 20px; z-index: 10; font-family: sans-serif; font-size: smaller; }
            #controls > button { display: block; width: 100%; text-align: left; margin: 5px 0px; }
            #controls > h3 { margin-top: 10px; }
            #recipe-panel {
                position: absolute; left: 0; right: 0; bottom: 0; max-height: 38vh; overflow: auto;
                background: #fff; border-top: 2px solid #999; z-index: 20; font-family: sans-serif; font-size: smaller;
            }
        </style>
        <link rel="stylesheet" type="text/css" href="molstar.css" />
        <script type="text/javascript" src="./index.js"></script>
    </head>
    <body>
        <div id="controls"></div>
        <div id="recipe-panel"></div>
        <div id="app"></div>
        <script>
            // Quick sanity-check presets for the base (non-rigid) particle cloud - independent of the
            // recipe editor, which builds rigid-body scenes (see #recipe-panel, mounted by index.ts).
            ParticleDynamicsDemo.init('app');

            addHeader('Particle count');
            addControl('1k particles', () => ParticleDynamicsDemo.start(1000, 120));
            addControl('3k particles', () => ParticleDynamicsDemo.start(3000, 150));
            addControl('10k particles', () => ParticleDynamicsDemo.start(10000, 220));
            addControl('25k particles', () => ParticleDynamicsDemo.start(25000, 300));
            addControl('50k particles', () => ParticleDynamicsDemo.start(50000, 380));

            addControl('Stop', () => ParticleDynamicsDemo.stop());

            function $(id) { return document.getElementById(id); }
            function addControl(label, action) {
                var btn = document.createElement('button');
                btn.onclick = action;
                btn.innerText = label;
                $('controls').appendChild(btn);
            }
            function addHeader(header) {
                var h = document.createElement('h3');
                h.innerText = header;
                $('controls').appendChild(h);
            }
        </script>
        <!-- __MOLSTAR_ANALYTICS__ -->
    </body>
</html>
